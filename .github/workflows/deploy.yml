name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install

      - name: Build
        working-directory: app
        run: pnpm build

      # Fix absolute asset paths for GitHub Pages subdirectory deployment.
      # Vinxi hardcodes /_build/ as the client router base; we rewrite it here.
      # Note: window.manifest inside <script> also contains /_build/ paths,
      # so we replace ALL occurrences in the HTML file, not just HTML attributes.
      - name: Fix asset paths for GitHub Pages
        run: |
          REPO_NAME="rester-dev"
          HTML="app/.output/public/index.html"
          sed -i "s|/_build/|/${REPO_NAME}/_build/|g" "$HTML"
          sed -i "s|href=\"/favicon.ico\"|href=\"/${REPO_NAME}/favicon.ico\"|g" "$HTML"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
